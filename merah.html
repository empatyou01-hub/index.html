<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Bule!</title>
    <style>
        :root {
            /* Gradasi langit malam: dari biru sangat tua ke hitam */
            --bg-night: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-night);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: var(--text-color);
            position: relative;
        }

        /* Efek Bintang-bintang di Background */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://s3-us-west-2.amazonaws.com/s.cdpn.io/123163/stars.png') repeat;
            z-index: 0;
            opacity: 0.5;
        }

        .container {
            text-align: center;
            cursor: pointer;
            z-index: 1; /* Biar di atas bintang */
        }

        #wrapper { transition: all 0.5s ease; }
        .gift-box {
            position: relative; width: 120px; height: 120px;
            background-color: #e63946; margin: 0 auto; border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .gift-box::before { content: ''; position: absolute; width: 20px; height: 100%; background-color: #f1faee; left: 50%; transform: translateX(-50%); }
        .gift-box::after { content: ''; position: absolute; width: 100%; height: 20px; background-color: #f1faee; top: 50%; transform: translateY(-50%); }
        .box-lid {
            position: absolute; top: -15px; left: -5px; width: 130px; height: 25px;
            background-color: #e63946; border-radius: 4px; z-index: 2; transition: all 0.5s ease;
        }

        .open .box-lid { transform: translateY(-100px) rotate(-15deg); opacity: 0; }
        .open .gift-box { transform: scale(0.5); opacity: 0; }

        .content { display: none; opacity: 0; transition: opacity 0.8s ease; }
        
        .cake-container {
            position: relative; font-size: 80px; margin-bottom: 20px; display: inline-block;
        }
        .cake-container::before {
            content: '🔥'; position: absolute; top: -15px; left: 50%;
            transform: translateX(-50%); font-size: 30px;
            animation: flicker 1s infinite alternate;
        }

        @keyframes flicker {
            from { opacity: 0.8; transform: translateX(-50%) scale(1); filter: drop-shadow(0 0 5px gold); }
            to { opacity: 1; transform: translateX(-50%) scale(1.1); filter: drop-shadow(0 0 15px orange); }
        }

        h1 { font-size: 1.8rem; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        p { color: #e0e0e0; font-size: 1.1rem; }

        .wa-btn {
            display: inline-block; padding: 12px 28px; background-color: #25d366;
            color: white; text-decoration: none; border-radius: 50px;
            font-weight: bold; margin-top: 10px;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container" onclick="openGift()">
        <div id="wrapper">
            <div class="box-lid"></div>
            <div class="gift-box"></div>
            <p style="font-size: 0.8rem; color: #888; margin-top: 20px;">TAP UNTUK BUKA</p>
        </div>
        
        <div class="content" id="messageContent">
            <div class="cake-container">🎂</div>
            <h1>Slamat kepala dua, Bul!</h1>
            <p>Dah legal nih sekarang. <br> Ditunggu minimal sakura lah ya.</p>
            <a href="https://wa.me/6281389295689?text=siap%20pir!" class="wa-btn">Bales di sini</a>
        </div>
    </div>

    <script>
        function openGift() {
            const wrapper = document.getElementById('wrapper');
            const content = document.getElementById('messageContent');
            wrapper.classList.add('open');
            setTimeout(() => {
                wrapper.style.display = 'none';
                content.style.display = 'block';
                setTimeout(() => { content.style.opacity = '1'; }, 50);
            }, 500);
        }
    </script>
</body>
</html>
