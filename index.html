<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Bule!</title>
    <style>
        /* Paksa background hitam pekat dulu biar gak polos */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050505 !important; /* Hitam pekat */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%) !important;
            font-family: Arial, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Tambahan efek bintik bintang manual */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            opacity: 0.3;
            z-index: 0;
        }

        .container { text-align: center; cursor: pointer; z-index: 10; position: relative; }
        
        /* Kotak Kado */
        #wrapper { transition: all 0.5s ease; }
        .gift-box {
            position: relative; width: 120px; height: 120px;
            background-color: #d63031; margin: 0 auto; border-radius: 8px;
        }
        .gift-box::before { content: ''; position: absolute; width: 20px; height: 100%; background-color: #fff; left: 50%; transform: translateX(-50%); }
        .gift-box::after { content: ''; position: absolute; width: 100%; height: 20px; background-color: #fff; top: 50%; transform: translateY(-50%); }
        .box-lid {
            position: absolute; top: -15px; left: -5px; width: 130px; height: 25px;
            background-color: #d63031; border-radius: 4px; z-index: 2; transition: all 0.5s ease;
        }

        .open .box-lid { transform: translateY(-100px) rotate(-15deg); opacity: 0; }
        .open .gift-box { transform: scale(0.5); opacity: 0; }

        .content { display: none; opacity: 0; transition: opacity 0.8s ease; }
        .cake { font-size: 80px; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(255,215,0,0.5)); }
        
        .wa-btn {
            display: inline-block; padding: 12px 24px; background-color: #25d366;
            color: white; text-decoration: none; border-radius: 50px;
            font-weight: bold; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="stars-container"></div>
    <div class="container" onclick="openGift()">
        <div id="wrapper">
            <div class="box-lid"></div>
            <div class="gift-box"></div>
            <p style="font-size: 0.8rem; color: #666; margin-top: 20px;">TAP TO OPEN</p>
        </div>
        
        <div class="content" id="messageContent">
            <div class="cake">🎂</div>
            <h1 style="margin:0;">Slamat kepala dua, Bul!</h1>
            <p style="color: #bbb;">Dah legal nih sekarang. <br> Ditunggu minimal sakura lah ya.</p>
            <a href="https://wa.me/6281389295689?text=siap%20pir!" class="wa-btn">Bales di sini</a>
        </div>
    </div>

    <script>
        function openGift() {
            const wrapper = document.getElementById('wrapper');
            const content = document.getElementById('messageContent');
            wrapper.classList.add('open');
            setTimeout(() => {
                wrapper.style.display = 'none';
                content.style.display = 'block';
                setTimeout(() => { content.style.opacity = '1'; }, 50);
            }, 500);
        }
    </script>
</body>
</html>
